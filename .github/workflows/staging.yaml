name: staging deploy (sandbox stub)

# 실제 배포 대신 "staging 태그가 트리거됐다"만 출력한다.
on:
  push:
    tags:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: (stub) staging 배포 트리거 확인
        run: |
          echo "✅ staging 배포가 트리거됨"
          echo "commit : $GITHUB_SHA"
          echo "version: $(node -p "require('./package.json').version")"
